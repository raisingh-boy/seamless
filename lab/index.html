            activeId: 0,
            physics: STYLE_PRESETS[0],
            mouse: { x: 0, y: 0, active: false }
          });

          // Синхронизируем мост при любых изменениях ползунков и сцен
          useEffect(() => {
            stateRef.current.physics = physics;
          }, [physics]);

          useEffect(() => {
            stateRef.current.activeId = activeId;
          }, [activeId]);

          // При переключении сцены автоматически загружаем её нативный физический пресет
          useEffect(() => {
            setPhysics(STYLE_PRESETS[activeId]);
          }, [activeId]);

          // Смена сцен по таймеру
          useEffect(() => {
            let interval = null;
            if (isPlaying) {
              interval = setInterval(() => {
                setActiveId((prev) => (prev + 1) % TOTAL_ERAS);
              }, 9500); 
            }
            return () => clearInterval(interval);
          }, [isPlaying]);

          // Запуск аудио-движка (вызывается жестом пользователя)
          const initAudio = () => {
            if (audioCtxRef.current) return;
            try {
              const AudioContext = window.AudioContext || window.webkitAudioContext;
              const ctx = new AudioContext();
              const gainNode = ctx.createGain();
              gainNode.gain.setValueAtTime(0, ctx.currentTime);
              gainNode.connect(ctx.destination);
              
              audioCtxRef.current = ctx;
              masterGainRef.current = gainNode;
            } catch (e) {
              console.error("Audio API not supported.", e);
            }
          };

          // Метод звукового синтеза индивидуальных нот
          const playSynthTone = (freq, type = 'sine', duration = 0.6, vol = 0.15) => {
            const ctx = audioCtxRef.current;
            const master = masterGainRef.current;
            if (!ctx || !soundEnabled || !master || ctx.state === 'suspended') return;

            try {
              const osc = ctx.createOscillator();
              const gain = ctx.createGain();

              osc.type = type;
              osc.frequency.setValueAtTime(freq, ctx.currentTime);
              
              gain.gain.setValueAtTime(vol, ctx.currentTime);
              gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);

              osc.connect(gain);
              gain.connect(master);

              osc.start();
              osc.stop(ctx.currentTime + duration);
            } catch (err) {
              console.warn("Sound synth interrupted: ", err);
            }
          };

          // Звуковой секвенсор (синхронизирован с состоянием звука и активной сценой)
          useEffect(() => {
            if (!soundEnabled) return;

            if (audioCtxRef.current && audioCtxRef.current.state === 'suspended') {
              audioCtxRef.current.resume();
            }

            let step = 0;
            const intervalTime = 320; 

            const intervalId = setInterval(() => {
              step++;
              const currentPreset = SOUND_PRESETS[activeId];
              const base = currentPreset.freqBase;
              const type = currentPreset.type;

              switch (activeId) {
                case 0: // Введение
                  if (step % 8 === 0) playSynthTone(base, type, 2.2, 0.25);
                  if (step % 8 === 4) playSynthTone(base * 1.5, type, 1.4, 0.18);
                  break;
                case 1: // Айседора Дункан
                  const scaleDuncan = [1, 1.25, 1.5, 1.75, 2];
                  const noteFactor = scaleDuncan[Math.floor(Math.sin(step * 0.5) * 2 + 2)];
                  playSynthTone(base * noteFactor, type, 1.0, 0.18);
                  break;
                case 2: // Баухаус
                  if (step % 2 === 0) {
                    const steps = [1, 1.2, 1.4, 1.6];
                    playSynthTone(base * steps[step % steps.length], type, 0.12, 0.12);
                  }
                  break;
                case 3: // Марта Грэм
                  if (step % 4 === 0) {
                    playSynthTone(base, type, 0.6, 0.3); 
                  } else if (step % 4 === 2) {
                    playSynthTone(base * 1.33, 'sine', 1.0, 0.15); 
                  }
                  break;
                case 4: // Мерс Каннингем
                  if (Math.random() > 0.4) {
                    const randFreq = base * (0.6 + Math.random() * 1.8);
                    playSynthTone(randFreq, type, 0.1 + Math.random() * 0.4, 0.1);
                  }
                  break;
                case 5: // Буто
                  if (step % 8 === 0) {
                    playSynthTone(base, type, 3.2, 0.4);
                    playSynthTone(base * 1.03, 'sine', 2.8, 0.2);
                  }
                  break;
                case 6: // Пина Бауш
                  if (step % 6 === 0) playSynthTone(base, type, 2.0, 0.25);
                  if (step % 6 === 3) playSynthTone(base * 1.2, type, 1.2, 0.18);
                  break;
                case 7: // Контемпорари
                  const mouseNorm = stateRef.current.mouse.active ? (stateRef.current.mouse.x / window.innerWidth) : 0.5;
                  playSynthTone(base + (mouseNorm * 220), type, 0.7, 0.15);
                  break;
                case 8: // Цифровой перформанс
                  if (step % 2 === 0) {
                    const glitchFreq = base * (Math.random() > 0.8 ? 2.5 : 1.25);
                    playSynthTone(glitchFreq, type, 0.08, 0.12);
                  }
                  break;
              }
            }, intervalTime);

            return () => clearInterval(intervalId);
          }, [soundEnabled, activeId]);

          // Включение/выключение звукового тракта
          const toggleSound = async () => {
            initAudio();
            const ctx = audioCtxRef.current;
            if (!ctx) return;

            if (ctx.state === 'suspended') {
              await ctx.resume();
            }

            const nextSoundState = !soundEnabled;
            setSoundEnabled(nextSoundState);

            if (nextSoundState && masterGainRef.current) {
              masterGainRef.current.gain.setValueAtTime(masterGainRef.current.gain.value, ctx.currentTime);
              masterGainRef.current.gain.linearRampToValueAtTime(0.18, ctx.currentTime + 0.5);
            } else if (masterGainRef.current) {
              masterGainRef.current.gain.setValueAtTime(masterGainRef.current.gain.value, ctx.currentTime);
              masterGainRef.current.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.3);
            }
          };

          // ЕДИНЫЙ, БЕСШОВНЫЙ ЦИКЛ СИМУЛЯЦИИ CANVAS (Вызывается ровно 1 раз)
          useEffect(() => {
            const canvas = canvasRef.current;
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            
            let w = canvas.width = canvas.parentElement.clientWidth;
            let h = canvas.height = canvas.parentElement.clientHeight;

            const handleResize = () => {
              if (canvas && canvas.parentElement) {
                w = canvas.width = canvas.parentElement.clientWidth;
                h = canvas.height = canvas.parentElement.clientHeight;
              }
            };
            window.addEventListener('resize', handleResize);

            // Функция создания единичной кинетической точки
            const createSingleParticle = (pw, ph, size) => ({
              x: Math.random() * pw,
              y: Math.random() * ph,
              vx: (Math.random() - 0.5) * 3,
              vy: (Math.random() - 0.5) * 3,
              size: Math.random() * size + 1,
              angle: Math.random() * Math.PI * 2,
              speed: Math.random() * 0.5 + 0.5,
              phase: Math.random() * Math.PI
            });

            // Наполняем начальный массив
            let particles = [];
            const initialPreset = stateRef.current.physics;
            for (let i = 0; i < initialPreset.particleCount; i++) {
              particles.push(createSingleParticle(w, h, initialPreset.particleSize));
            }

            let localTime = 0;

            const render = () => {
              localTime += 0.015;
              
              // ЧИТАЕМ ПАРАМЕТРЫ ФИЗИКИ И АКТИВНОГО СЛАЙДА ИЗ МОСТА В РЕАЛЬНОМ ВРЕМЕНИ
              const currentPhysics = stateRef.current.physics;
              const currentActiveId = stateRef.current.activeId;
              const currentMouse = stateRef.current.mouse;

              // ДИНАМИЧЕСКИ КОРРЕКТИРУЕМ КОЛИЧЕСТВО ЧАСТИЦ БЕЗ ПЕРЕЗАПУСКА ЦИКЛА
              if (particles.length < currentPhysics.particleCount) {
                while (particles.length < currentPhysics.particleCount) {
                  particles.push(createSingleParticle(w, h, currentPhysics.particleSize));
                }
              } else if (particles.length > currentPhysics.particleCount) {
                particles.splice(currentPhysics.particleCount);
              }

              // Применяем обновленный шлейф
              ctx.fillStyle = `rgba(10, 10, 10, ${currentPhysics.trail})`;
              ctx.fillRect(0, 0, w, h);

              const cx = w / 2;
              const cy = h / 2;

              switch (currentActiveId) {
                case 0: // Введение - Плавный дрейф
                  particles.forEach((p) => {
                    p.vy += currentPhysics.gravity * 0.1; // Гравитация
                    p.vx += Math.sin(p.y * 0.005 + localTime) * 0.05;
                    p.vy += Math.cos(p.x * 0.005 + localTime) * 0.05;
                    p.x += p.vx;
                    p.y += p.vy;

                    p.vx *= (1 - currentPhysics.friction);
                    p.vy *= (1 - currentPhysics.friction);

                    if (currentMouse.active) {
                      const dx = currentMouse.x - p.x;
                      const dy = currentMouse.y - p.y;
                      const dist = Math.sqrt(dx*dx + dy*dy);
                      if (dist < 150) {
                        p.vx += (dx / dist) * 0.2;
                        p.vy += (dy / dist) * 0.2;
                      }
                    }

                    const currentSize = (p.size / STYLE_PRESETS[currentActiveId].particleSize) * currentPhysics.particleSize;

                    ctx.beginPath();
                    ctx.arc(p.x, p.y, Math.max(0.5, currentSize), 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.45)';
                    ctx.fill();

                    if (p.x < 0) p.x = w; if (p.x > w) p.x = 0;
                    if (p.y < 0) p.y = h; if (p.y > h) p.y = 0;
                  });
                  break;

                case 1: // Айседора Дункан
                  particles.forEach((p, idx) => {
                    p.vx += 0.15; 
                    const waveY = (h / 2) + Math.sin(p.x * 0.005 + localTime + p.phase) * (150 * (1 - currentPhysics.gravity * 1.5));
                    p.vy += (waveY - p.y) * 0.04;

                    p.vy += currentPhysics.gravity * 0.2; 
                    p.vx *= (1 - currentPhysics.friction);
                    p.vy *= (1 - currentPhysics.friction);

                    p.x += p.vx;
                    p.y += p.vy;

                    if (currentMouse.active) {
                      const dx = currentMouse.x - p.x;
                      const dy = currentMouse.y - p.y;
                      const dist = Math.sqrt(dx*dx + dy*dy);
                      if (dist < 150) {
                        p.vy += (dy / dist) * 0.25;
                      }
                    }

                    if (p.x > w) p.x = 0;
                    if (p.y < 0) p.y = h; if (p.y > h) p.y = 0;

                    const currentSize = (p.size / STYLE_PRESETS[currentActiveId].particleSize) * currentPhysics.particleSize;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, Math.max(0.5, currentSize), 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.55)';
                    ctx.fill();
                  });
                  break;

                case 2: // Оскар Шлеммер
                  particles.forEach((p, idx) => {
                    const orbitIndex = idx % 5;
                    const radius = (70 + orbitIndex * 40) * (1 - currentPhysics.gravity * 0.6); 
                    const speedFactor = (0.25 - orbitIndex * 0.03) * (1 - currentPhysics.friction * 3.5); 
                    const angle = localTime * speedFactor + p.phase;

                    const targetX = cx + Math.cos(angle) * radius;
                    const targetY = cy + Math.sin(angle) * radius + (currentPhysics.gravity * 150); 

                    p.x += (targetX - p.x) * 0.1;
                    p.y += (targetY - p.y) * 0.1;

                    const currentSize = (p.size / STYLE_PRESETS[currentActiveId].particleSize) * currentPhysics.particleSize;

                    ctx.fillStyle = idx % 2 === 0 ? '#ffffff' : 'rgba(255, 255, 255, 0.25)';
                    ctx.beginPath();
                    if (idx % 3 === 0) {
                      ctx.rect(p.x - currentSize, p.y - currentSize, currentSize * 2, currentSize * 2);
                    } else if (idx % 3 === 1) {
                      ctx.arc(p.x, p.y, currentSize, 0, Math.PI * 2);
                    } else {
                      ctx.moveTo(p.x, p.y - currentSize);
                      ctx.lineTo(p.x + currentSize, p.y + currentSize);
                      ctx.lineTo(p.x - currentSize, p.y + currentSize);
                      ctx.closePath();
                    }
                    ctx.fill();
                  });

                  if (currentMouse.active) {
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.25)';
                    ctx.beginPath();
                    ctx.moveTo(0, currentMouse.y); ctx.lineTo(w, currentMouse.y);
                    ctx.moveTo(currentMouse.x, 0); ctx.lineTo(currentMouse.x, h);
                    ctx.stroke();
                  }
                  break;

                case 3: // Марта Грэм
                  const breathe = Math.abs(Math.sin(localTime * 1.5 * (1 - currentPhysics.friction * 2.5))); 
                  const maxRadius = (100 + breathe * 150) * (1 - currentPhysics.gravity * 0.4); 

                  ctx.strokeStyle = `rgba(255, 255, 255, ${0.05 + (1 - breathe) * 0.12})`;
                  ctx.lineWidth = 0.8;
                  ctx.beginPath();

                  particles.forEach((p, index) => {
                    const targetX = cx + Math.cos(p.angle) * maxRadius;
                    const targetY = cy + Math.sin(p.angle) * maxRadius + (currentPhysics.gravity * 120); 

                    p.x += (targetX - p.x) * 0.08;
                    p.y += (targetY - p.y) * 0.08;

                    if (index > 0 && index % 4 === 0) {
                      ctx.moveTo(p.x, p.y);
                      ctx.lineTo(particles[index - 1].x, particles[index - 1].y);
                    }

                    const currentSize = (p.size / STYLE_PRESETS[currentActiveId].particleSize) * currentPhysics.particleSize;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, Math.max(0.5, currentSize * (1 + breathe * 0.5)), 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 255, 255, ${0.3 + breathe * 0.5})`;
                    ctx.fill();
                  });
                  ctx.stroke();
                  break;

                case 4: // Мерс Каннингем
                  particles.forEach((p) => {
                    p.vy += currentPhysics.gravity * 0.15; 
                    
                    p.x += p.vx * 1.8 * (1 - currentPhysics.friction * 3); 
                    p.y += p.vy * 1.8 * (1 - currentPhysics.friction * 3);

                    if (p.x < 0 || p.x > w) p.vx *= -1;
                    if (p.y < 0 || p.y > h) p.vy *= -1;

                    const currentSize = (p.size / STYLE_PRESETS[currentActiveId].particleSize) * currentPhysics.particleSize;
                    ctx.fillStyle = 'rgba(255,255,255,0.75)';
                    ctx.fillRect(p.x - currentSize, p.y - currentSize, currentSize * 2, currentSize * 2);
                  });

                  ctx.strokeStyle = 'rgba(255, 255, 255, 0.06)';
                  ctx.lineWidth = 1;
                  for (let i = 0; i < particles.length; i += 2) {
                    for (let j = i + 1; j < particles.length; j += 4) {
                      const dx = particles[i].x - particles[j].x;
                      const dy = particles[i].y - particles[j].y;
                      const dist = Math.sqrt(dx*dx + dy*dy);
                      if (dist < 90) {
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                      }
                    }
                  }
                  break;

                case 5: // Буто
                  ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                  particles.forEach((p) => {
                    p.vy += currentPhysics.gravity * 0.25; 
                    
                    p.vx *= (1 - currentPhysics.friction * 1.5); 
                    p.vy *= (1 - currentPhysics.friction * 1.5);

                    p.x += p.vx * 0.5;
                    p.y += p.vy * 0.5;

                    if (p.y > h - 12) {
                      p.y = h - 12;
                      p.vy = 0;
                      p.vx = (Math.random() - 0.5) * 0.1;
                    }

                    if (currentMouse.active) {
                      const dx = currentMouse.x - p.x;
                      const dy = currentMouse.y - p.y;
                      const dist = Math.sqrt(dx*dx + dy*dy);
                      if (dist < 100) {
                        p.vy -= (1 - dist / 100) * 1.8;
                        p.vx += (dx / dist) * 0.8;
                      }
                    }

                    const currentSize = (p.size / STYLE_PRESETS[currentActiveId].particleSize) * currentPhysics.particleSize;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, Math.max(0.5, currentSize), 0, Math.PI * 2);
                    ctx.fill();
                  });
                  break;

                case 6: // Пина Бауш
                  particles.forEach((p) => {
                    p.y += (Math.abs(p.vy) * 0.4 + 0.8) * (1 + currentPhysics.gravity * 3); 
                    p.x += Math.sin(p.y * 0.015 + p.phase) * 0.8 * (1 - currentPhysics.friction * 2.8); 

                    if (p.y > h) {
                      p.y = -15;
                      p.x = Math.random() * w;
                      p.vy = Math.random() * 0.5 + 0.5;
                    }

                    if (currentMouse.active) {
                      const dx = currentMouse.x - p.x;
                      const dy = currentMouse.y - p.y;
                      const dist = Math.sqrt(dx*dx + dy*dy);
                      if (dist < 120) {
                        p.x -= (dx / dist) * 4;
                        p.y -= (dy / dist) * 1.5;
                      }
                    }

                    const currentSize = (p.size / STYLE_PRESETS[currentActiveId].particleSize) * currentPhysics.particleSize;
                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.y * 0.008 + p.phase);
                    ctx.fillStyle = 'rgba(235, 60, 90, 0.65)';
                    ctx.beginPath();
                    ctx.ellipse(0, 0, Math.max(1, currentSize * 2.5), Math.max(0.5, currentSize * 1.5), 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                  });
                  break;

                case 7: // ПОЛНОСТЬЮ ОБНОВЛЕННАЯ СЦЕНА 8 (Contemporary) — Жидкое Векторное Поле (Безупречная видимость)
                  particles.forEach((p, idx) => {
                    // Создаем плавные завихрения воздушных потоков (Flow Field)
                    const angle = Math.sin(p.y * 0.008 + localTime) * Math.PI * 0.5 + Math.cos(p.x * 0.008 - localTime) * Math.PI * 0.5;
                    p.vx += Math.cos(angle) * 0.12;
                    p.vy += Math.sin(angle) * 0.12;

                    // Учитываем гравитацию
                    p.vy += currentPhysics.gravity * 0.15;

                    // Плавный интерактив с пальцем/мышкой (расталкивание с затуханием)
                    if (currentMouse.active) {
                      const dx = currentMouse.x - p.x;
                      const dy = currentMouse.y - p.y;
                      const dist = Math.sqrt(dx*dx + dy*dy);
                      if (dist < 160) {
                        const pushPower = (160 - dist) / 160;
                        p.vx -= (dx / dist) * pushPower * 1.1;
                        p.vy -= (dy / dist) * pushPower * 1.1;
                      }
                    }

                    // Применение трения
                    p.vx *= (1 - currentPhysics.friction);
                    p.vy *= (1 - currentPhysics.friction);
                    p.x += p.vx;
                    p.y += p.vy;

                    // Бесшовный обход границ экрана
                    if (p.x < -10) p.x = w + 10; if (p.x > w + 10) p.x = -10;
                    if (p.y < -10) p.y = h + 10; if (p.y > h + 10) p.y = -10;

                    // Вычисление размера
                    const currentSize = (p.size / STYLE_PRESETS[currentActiveId].particleSize) * currentPhysics.particleSize;

                    // Отрисовка светящихся узлов-ядер
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, Math.max(1, currentSize), 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 255, 255, ${0.45 + Math.sin(localTime + p.phase) * 0.2})`;
                    ctx.fill();

                    // Бесшовная паутина связей между соседними точками
                    for (let j = idx + 1; j < particles.length; j++) {
                      const p2 = particles[j];
                      const dx = p.x - p2.x;
                      const dy = p.y - p2.y;
                      const dist = Math.sqrt(dx*dx + dy*dy);
                      if (dist < 95) {
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.strokeStyle = `rgba(255, 255, 255, ${0.18 * (1 - dist / 95)})`;
                        ctx.lineWidth = 0.65;
                        ctx.stroke();
                      }
                    }
                  });
                  break;

                case 8: // Цифровой кибер-перформанс
                  ctx.strokeStyle = 'rgba(255, 255, 255, 0.04)';
                  ctx.lineWidth = 1;
                  const gridSize = 40;

                  for (let x = 0; x < w; x += gridSize) {
                    for (let y = 0; y < h; y += gridSize) {
                      let angle = Math.sin(x * 0.002 + localTime) * Math.PI * 2 + (currentPhysics.gravity * Math.PI); 
                      
                      if (currentMouse.active) {
                        const dx = currentMouse.x - x;
                        const dy = currentMouse.y - y;
                        const dist = Math.sqrt(dx*dx + dy*dy);
                        if (dist < 150) {
                          angle = Math.atan2(dy, dx) + Math.PI / 2;
                        }
                      }

                      const len = gridSize * 0.4 * (1 - currentPhysics.friction * 2); 
                      ctx.beginPath();
                      ctx.moveTo(x, y);
                      ctx.lineTo(x + Math.cos(angle) * len, y + Math.sin(angle) * len);
                      ctx.stroke();
                    }
                  }

                  ctx.fillStyle = '#ffffff';
                  particles.forEach(p => {
                    p.vy += currentPhysics.gravity * 0.1;
                    p.vx *= (1 - currentPhysics.friction);
                    p.vy *= (1 - currentPhysics.friction);
                    p.x += p.vx * 1.5;
                    p.y += p.vy * 1.5;
                    if (p.x < 0) p.x = w; if (p.x > w) p.x = 0;
                    if (p.y < 0) p.y = h; if (p.y > h) p.y = 0;

                    const currentSize = (p.size / STYLE_PRESETS[currentActiveId].particleSize) * currentPhysics.particleSize;
                    ctx.fillRect(p.x, p.y, Math.max(1, currentSize), Math.max(1, currentSize));
                  });
                  break;
              }

              animationFrameRef.current = requestAnimationFrame(render);
            };

            render();

            return () => {
              cancelAnimationFrame(animationFrameRef.current);
              window.removeEventListener('resize', handleResize);
            };
          }, []); // Пустые зависимости — бесконечный бесшовный цикл

          // --- ОБРАБОТЧИКИ ДЛЯ ТАЧПАДОВ И МЫШЕК ---
          const handleMouseMove = (e) => {
            const rect = canvasRef.current.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            mouseRef.current = { x, y, active: true };
            stateRef.current.mouse = { x, y, active: true };
          };

          const handleMouseEnter = () => {
            setShowHelper(false);
            mouseRef.current.active = true;
            stateRef.current.mouse.active = true;
          };

          const handleMouseLeave = () => {
            mouseRef.current.active = false;
            stateRef.current.mouse.active = false;
          };

          // Фиксы для тач-скрина (смартфоны)
          const handleTouchStart = (e) => {
            setShowHelper(false);
            const rect = canvasRef.current.getBoundingClientRect();
            const touch = e.touches[0];
            const x = touch.clientX - rect.left;
            const y = touch.clientY - rect.top;
            mouseRef.current = { x, y, active: true };
            stateRef.current.mouse = { x, y, active: true };
          };

          const handleTouchMove = (e) => {
            const rect = canvasRef.current.getBoundingClientRect();
            const touch = e.touches[0];
            const x = touch.clientX - rect.left;
            const y = touch.clientY - rect.top;
            mouseRef.current = { x, y, active: true };
            stateRef.current.mouse = { x, y, active: true };
          };

          const handleTouchEnd = () => {
            mouseRef.current.active = false;
            stateRef.current.mouse.active = false;
          };

          const resetPhysics = () => {
            setPhysics(STYLE_PRESETS[activeId]);
          };

          const updatePhysicsParam = (param, val) => {
            setPhysics(prev => ({
              ...prev,
              [param]: Number(val)
            }));
          };

          const currentEra = TRANSLATIONS[lang].eras[activeId];
          const labels = TRANSLATIONS[lang];

          return (
            <div className="w-full min-h-screen bg-[#070707] text-white flex flex-col font-sans selection:bg-white selection:text-black">
              
              {/* Шапка лаборатории */}
              <header className="px-8 py-5 border-b border-white/5 flex flex-col sm:flex-row justify-between items-center gap-4 bg-black/40 backdrop-blur-md">
                <div className="flex items-center gap-3">
                  <div className="w-2.5 h-2.5 rounded-full bg-red-600 animate-pulse"></div>
                  <div>
                    <h1 className="text-sm font-semibold tracking-[0.3em] uppercase">{labels.appTitle}</h1>
                    <p className="text-[10px] text-zinc-500 uppercase tracking-widest mt-0.5">{labels.appSubtitle}</p>
                  </div>
                </div>

                {/* Языковой переключатель и Навигационный пульт */}
                <div className="flex items-center gap-4">
                  
                  {/* Языковая кнопка */}
                  <button 
                    onClick={() => setLang(prev => prev === 'ru' ? 'en' : 'ru')}
                    className="flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-zinc-900 border border-white/5 text-xs text-zinc-300 hover:text-white transition-colors"
                    title="Switch Language / Сменить Язык"
                  >
                    <LanguagesIcon />
                    <span className="uppercase font-semibold font-mono">{lang === 'ru' ? 'RU' : 'EN'}</span>
                  </button>

                  {/* Пульт */}
                  <div className="flex items-center gap-1.5 bg-zinc-900/80 p-1 rounded-full border border-white/5">
                    <button 
                      onClick={() => setActiveId(prev => (prev - 1 + TOTAL_ERAS) % TOTAL_ERAS)}
                      className="p-1.5 rounded-full hover:bg-white/10 transition-colors text-zinc-400 hover:text-white"
                    >
                      <ChevronLeftIcon />
                    </button>
                    
                    <span className="text-xs px-3 font-medium text-zinc-300 select-none min-w-[130px] text-center">
                      {activeId + 1} / {TOTAL_ERAS} • {currentEra.time}
                    </span>

                    <button 
                      onClick={() => setActiveId(prev => (prev + 1) % TOTAL_ERAS)}
                      className="p-1.5 rounded-full hover:bg-white/10 transition-colors text-zinc-400 hover:text-white"
                    >
                      <ChevronRightIcon />
                    </button>
                  </div>
                </div>
              </header>

              {/* Основной двухпанельный интерфейс */}
              <main className="flex-grow grid grid-cols-1 lg:grid-cols-12 gap-6 p-6 items-stretch">
                
                {/* ЛЕВАЯ ПАНЕЛЬ: ТЕОРИЯ, КОНЦЕПТЫ И УПРАЖНЕНИЯ */}
                <section className="lg:col-span-5 flex flex-col gap-6">
                  
                  {/* Информационная карточка активной эпохи */}
                  <div className="flex-grow bg-zinc-950/80 border border-white/5 rounded-2xl p-6 flex flex-col justify-between backdrop-blur-md">
                    <div>
                      <div className="flex justify-between items-start mb-4">
                        <span className="text-[10px] bg-white/10 text-white/80 px-2.5 py-1 rounded-full uppercase tracking-wider font-semibold">
                          {currentEra.time}
                        </span>
                        <span className="text-xs text-zinc-500 font-mono">
                          {labels.conceptLabel}: {currentEra.concept}
                        </span>
                      </div>

                      <h2 className="text-3xl font-light font-serif italic text-zinc-100 mb-1 tracking-wide lowercase">
                        {currentEra.title}
                      </h2>
                      <p className="text-xs text-zinc-500 uppercase tracking-widest font-medium mb-6">
                        {currentEra.subtitle}
                      </p>

                      <p className="text-zinc-300 text-sm leading-relaxed mb-6 font-light">
                        {currentEra.description}
                      </p>

                      {/* Цитата эпохи */}
                      <div className="border-l-2 border-red-600/60 pl-4 py-1 italic text-zinc-400 text-sm my-6 bg-red-950/5">
                        "{currentEra.quote}"
                        <span className="block text-[10px] uppercase tracking-widest text-zinc-500 mt-2 not-italic font-sans">
                          — {currentEra.author}
                        </span>
                      </div>
                    </div>

                    {/* Вкладка: Практический импульс */}
                    <div className="border-t border-white/5 pt-4">
                      <div className="flex gap-4 mb-3">
                        <span className="text-xs uppercase tracking-widest pb-1 border-b-2 border-white font-semibold text-white">
                          {labels.conceptLabel}
                        </span>
                      </div>
                      
                      <div className="text-xs text-zinc-400 bg-white/[0.02] p-3.5 rounded-xl border border-white/5">
                        <p className="font-semibold text-white mb-1 uppercase tracking-wider text-[10px] flex items-center gap-1.5">
                          <ActivityIcon /> {labels.exerciseLabel}:
                        </p>
                        {currentEra.exercise}
                      </div>
                    </div>
                  </div>

                  {/* Интерактивный плеер времени */}
                  <div className="bg-zinc-950/80 border border-white/5 rounded-2xl p-5 flex items-center justify-between backdrop-blur-md">
                    <div className="flex items-center gap-4">
                      <button 
                        onClick={() => setIsPlaying(!isPlaying)}
                        className={`w-11 h-11 rounded-full flex items-center justify-center transition-all ${isPlaying ? 'bg-white text-black' : 'bg-zinc-800 text-white hover:bg-zinc-700'}`}
                      >
                        {isPlaying ? <PauseIcon /> : <PlayIcon />}
                      </button>
                      
                      <div>
                        <span className="text-xs uppercase tracking-widest text-zinc-400">{labels.autoFlow}</span>
                        <p className="text-[10px] text-zinc-500 font-light">{labels.autoFlowDesc}</p>
                      </div>
                    </div>

                    <div className="flex items-center gap-3">
                      <button 
                        onClick={toggleSound}
                        className={`w-10 h-10 rounded-full flex items-center justify-center transition-all ${soundEnabled ? 'bg-red-600 text-white border border-red-500 animate-pulse' : 'bg-zinc-800 text-zinc-400 hover:text-white'}`}
                        title={labels.synthLabel}
                      >
                        {soundEnabled ? <Volume2Icon /> : <VolumeXIcon />}
                      </button>
                    </div>
                  </div>
                </section>

                {/* ПРАВАЯ ПАНЕЛЬ: ИНТЕРАКТИВНЫЙ ХОЛСТ И ПАНЕЛЬ НАСТРОЙКИ ФИЗИКИ */}
                <section className="lg:col-span-7 flex flex-col gap-6">
                  
                  {/* Интерактивный генеративный холст */}
                  <div className="flex-grow bg-[#0a0a0a] rounded-2xl border border-white/5 relative overflow-hidden group min-h-[350px]">
                    {showHelper && (
                      <div className="absolute top-4 left-4 z-10 pointer-events-none text-[9px] uppercase tracking-widest bg-black/60 px-3 py-1.5 rounded-full border border-white/5 flex items-center gap-1.5">
                        <SparklesIcon /> {labels.helperText}
                      </div>
                    )}

                    <canvas 
                      ref={canvasRef}
                      onMouseMove={handleMouseMove}
                      onMouseEnter={handleMouseEnter}
                      onMouseLeave={handleMouseLeave}
                      onTouchStart={handleTouchStart}
                      onTouchMove={handleTouchMove}
                      onTouchEnd={handleTouchEnd}
                      onTouchCancel={handleTouchEnd}
                      className="w-full h-full cursor-none"
                    />
                  </div>

                  {/* Панель тонкой настройки физики движения */}
                  <div className="bg-zinc-950/80 border border-white/5 rounded-2xl p-6 backdrop-blur-md">
                    <div className="flex justify-between items-center mb-5">
                      <div className="flex items-center gap-2">
                        <SlidersIcon />
                        <h3 className="text-xs uppercase tracking-widest font-semibold text-zinc-300">
                          {labels.settingsTitle}
                        </h3>
                      </div>
                      <button 
                        onClick={resetPhysics}
                        className="text-[10px] uppercase tracking-widest text-zinc-500 hover:text-white flex items-center gap-1.5 transition-colors"
                      >
                        <RotateCcwIcon size={10} /> {labels.resetPreset}
                      </button>
                    </div>

                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-x-6 gap-y-4">
                      {/* Слайдер: Плотность (Гравитация) */}
                      <div className="flex flex-col gap-2">
                        <div className="flex justify-between text-[10px] uppercase tracking-widest text-zinc-500">
                          <span>{labels.paramGravity}</span>
                          <span className="font-mono text-zinc-300">{physics.gravity}</span>
                        </div>
                        <input 
                          type="range" 
                          min="-0.5" 
                          max="0.8" 
                          step="0.01" 
                          value={physics.gravity}
                          onChange={(e) => updatePhysicsParam('gravity', e.target.value)}
                          className="w-full accent-white bg-zinc-800 h-1 rounded-lg appearance-none cursor-pointer"
                        />
                      </div>

                      {/* Слайдер: Сила трения среды */}
                      <div className="flex flex-col gap-2">
                        <div className="flex justify-between text-[10px] uppercase tracking-widest text-zinc-500">
                          <span>{labels.paramFriction}</span>
                          <span className="font-mono text-zinc-300">{(physics.friction * 100).toFixed(0)}%</span>
                        </div>
                        <input 
                          type="range" 
                          min="0.0" 
                          max="0.3" 
                          step="0.01" 
                          value={physics.friction}
                          onChange={(e) => updatePhysicsParam('friction', e.target.value)}
                          className="w-full accent-white bg-zinc-800 h-1 rounded-lg appearance-none cursor-pointer"
                        />
                      </div>

                      {/* Слайдер: Количество танцующих частиц */}
                      <div className="flex flex-col gap-2">
                        <div className="flex justify-between text-[10px] uppercase tracking-widest text-zinc-500">
                          <span>{labels.paramParticles}</span>
                          <span className="font-mono text-zinc-300">{physics.particleCount}</span>
                        </div>
                        <input 
                          type="range" 
                          min="10" 
                          max="350" 
                          step="5" 
                          value={physics.particleCount}
                          onChange={(e) => updatePhysicsParam('particleCount', e.target.value)}
                          className="w-full accent-white bg-zinc-800 h-1 rounded-lg appearance-none cursor-pointer"
                        />
                      </div>

                      {/* Слайдер: Инерция следа (шлейф движения) */}
                      <div className="flex flex-col gap-2">
                        <div className="flex justify-between text-[10px] uppercase tracking-widest text-zinc-500">
                          <span>{labels.paramTrail}</span>
                          <span className="font-mono text-zinc-300">{physics.trail}</span>
                        </div>
                        <input 
                          type="range" 
                          min="0.01" 
                          max="0.6" 
                          step="0.01" 
                          value={physics.trail}
                          onChange={(e) => updatePhysicsParam('trail', e.target.value)}
                          className="w-full accent-white bg-zinc-800 h-1 rounded-lg appearance-none cursor-pointer"
                        />
                      </div>
                    </div>
                  </div>
                </section>
              </main>

              {/* Футер приложения */}
              <footer className="px-8 py-4 border-t border-white/5 flex flex-col sm:flex-row justify-between items-center gap-2 bg-black/20 text-[10px] text-zinc-500 uppercase tracking-widest">
                <span>{labels.footerTitle}</span>
                <span>{labels.footerSubtitle}</span>
              </footer>
            </div>
          );
        }

        // Рендеринг приложения в DOM
        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
