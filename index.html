<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEAMLESS Education</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: linear-gradient(160deg, #f5eedb 0%, #e8dfc4 60%, #ddd0a8 100%);
    color: #1a1712;
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .container {
    width: 100%;
    max-width: 400px;
    padding: 48px 24px 72px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .logo-wrap {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    overflow: hidden;
    margin-bottom: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.12);
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 0.1s;
  }

  .logo-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .bio {
    font-size: 13px;
    color: #7a7060;
    text-align: center;
    margin-bottom: 20px;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 0.2s;
  }

  .socials {
    display: flex;
    gap: 12px;
    margin-bottom: 32px;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 0.25s;
  }

  .social-icon {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: rgba(255,255,255,0.5);
    border: 1px solid rgba(0,0,0,0.10);
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    color: #1a1712;
    transition: background 0.2s;
  }

  .social-icon:hover { background: rgba(255,255,255,0.8); }

  .social-icon svg {
    width: 16px;
    height: 16px;
    stroke: currentColor;
    fill: none;
    stroke-width: 1.8;
  }

  .links {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .link-btn {
    display: flex;
    align-items: center;
    width: 100%;
    background: rgba(255,255,255,0.45);
    border: 1px solid rgba(255,255,255,0.7);
    border-radius: 12px;
    padding: 14px 18px;
    text-decoration: none;
    color: #1a1712;
    backdrop-filter: blur(4px);
    transition: background 0.2s, transform 0.15s;
    gap: 12px;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards;
  }

  .link-btn:nth-child(1) { animation-delay: 0.32s; }
  .link-btn:nth-child(2) { animation-delay: 0.39s; }
  .link-btn:nth-child(3) { animation-delay: 0.46s; }
  .link-btn:nth-child(4) { animation-delay: 0.53s; }
  .link-btn:nth-child(5) { animation-delay: 0.60s; }

  .link-btn:hover {
    background: rgba(255,255,255,0.65);
    transform: translateY(-1px);
  }

  .btn-icon {
    width: 32px;
    height: 32px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .btn-icon svg {
    width: 18px;
    height: 18px;
    stroke: #8a7230;
    fill: none;
    stroke-width: 1.8;
  }

  .btn-text { flex: 1; text-align: center; }

  .btn-title {
    font-size: 14px;
    font-weight: 500;
    line-height: 1.3;
  }

  .btn-price {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: #7a7060;
    margin-top: 2px;
  }

  .btn-arrow {
    font-size: 14px;
    color: #7a7060;
    flex-shrink: 0;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
